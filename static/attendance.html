<!-- static/attendance.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FaceRoll AI — Attendance Log</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a href="/">🎭 Live</a>
    <a href="/register">➕ Register</a>
    <a href="/attendance" class="active">📋 Attendance</a>
  </nav>

  <div class="container">
    <h1>Attendance Log</h1>
    <button id="refreshBtn">🔄 Refresh</button>
    <table>
      <thead>
        <tr><th>Name</th><th>Date</th><th>Time</th></tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function loadAttendance() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="3">Loading...</td></tr>';
      try {
        const res = await fetch('/api/attendance');
        const data = await res.json();
        if (data.records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3">No records yet.</td></tr>';
          return;
        }
        tbody.innerHTML = data.records
          .map(r => `<tr><td>${r.Name}</td><td>${r.Date}</td><td>${r.Time}</td></tr>`)
          .join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="3">⚠️ Error loading data.</td></tr>';
      }
    }

    document.getElementById('refreshBtn').onclick = loadAttendance;
    loadAttendance();
  </script>
</body>
</html>
